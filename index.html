<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シード共有対応 反転パズル</title>
    <style>
        /* 既存のスタイルを継承しつつ、共有用エリアを追加 */
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #333; }
        #status-label { font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        #moves-label { font-size: 20px; font-weight: bold; color: blue; margin-bottom: 15px; }
        .section-box { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 15px; position: relative; }
        .section-title { font-size: 14px; font-weight: bold; margin-top: -20px; background: white; display: inline-block; padding: 0 5px; color: #555; }
        .radio-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-group { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        button { cursor: pointer; border: 1px solid #aaa; border-radius: 5px; padding: 8px 10px; font-size: 14px; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        #btn-easy { background-color: #ccffcc; } #btn-normal { background-color: #ffffcc; }
        #btn-hard { background-color: #ffcccc; } #btn-super { background-color: #ff99cc; }
        #btn-god { background-color: #cc99ff; }
        #btn-reset { background-color: #ffddaa; width: 100%; padding: 10px; margin-bottom: 15px; }
        
        /* 盤面 */
        #grid-container { display: grid; gap: 2px; margin: 20px auto; justify-content: center; background-color: #333; padding: 2px; border: 2px solid #333; }
        .cell { background-color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: blue; transition: background-color 0.2s; }
        .cell.active { background-color: #ff9999; }

        /* シード・共有エリア */
        #seed-area { background-color: #fff3e0; }
        .seed-input-group { display: flex; gap: 5px; margin-top: 5px; }
        #seed-input { flex: 1; padding: 5px; font-family: monospace; }
        
        .answer-btn { width: 100%; padding: 10px; margin-bottom: 5px; font-size: 14px; background-color: #e6e6fa; }
        .controls { display: grid; grid-template-columns: 50px 50px 50px; gap: 5px; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>反転パズル (シード共有版)</h1>
    
    <div id="status-label">サイズと難易度を選んでください</div>
    <div id="moves-label">残り手数: -</div>

    <div class="section-box" id="seed-area">
        <div class="section-title">パズルを共有する</div>
        <div class="seed-input-group">
            <input type="text" id="seed-input" placeholder="シード値 (例: 5-15-1234)">
            <button onclick="playFromSeedInput()">読込</button>
            <button onclick="copyShareURL()">URLコピー</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">新規ゲーム作成</div>
        <div class="radio-group" id="size-selectors"></div>
        <div class="btn-group" style="margin-top:10px;">
            <button id="btn-easy" onclick="startGameByDifficulty(8)">初級</button>
            <button id="btn-normal" onclick="startGameByDifficulty(15)">中級</button>
            <button id="btn-hard" onclick="startGameByDifficulty(22)">上級</button>
            <button id="btn-super" onclick="startGameByDifficulty(27)">超級</button>
            <button id="btn-god" onclick="startGameByDifficulty(30)">神級</button>
        </div>
    </div>

    <div id="grid-container"></div>

    <button id="btn-reset" onclick="resetGame()">🔄 同じ問題をやり直す</button>

    <div class="section-box" style="background-color: #f0f8ff;">
        <div class="section-title" style="background-color: #f0f8ff;">解答機能</div>
        <button class="answer-btn" onclick="toggleAnswer()">💡 解答を表示</button>
        <button class="answer-btn" id="btn-autoplay" onclick="autoPlayAnswer()" style="background-color: #d8bfd8;">▶ 自動実演</button>
        <div id="answer-display" style="display: none; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="controls">
        <div style="grid-column: 2;"><button onclick="attemptMove('Up')">▲</button></div>
        <div style="grid-column: 1; grid-row: 2;"><button onclick="attemptMove('Left')">◀</button></div>
        <div style="grid-column: 2; grid-row: 2;"><button onclick="attemptMove('Down')">▼</button></div>
        <div style="grid-column: 3; grid-row: 2;"><button onclick="attemptMove('Right')">▶</button></div>
    </div>
</div>

<script>
    // --- シード付き乱数生成器 (Mulberry32) ---
    function mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    let gridSize = 5;
    let gridData = [];
    let playerPos = [0, 0];
    let movesLeft = 0;
    let isPlaying = false;
    let lastMove = null;
    let currentSeedString = "";

    let initialGridData, initialPlayerPos, initialMoves, solutionMoves;
    let isAutoPlaying = false;
    let autoPlayInterval = null;

    const opposites = {'Up': 'Down', 'Down': 'Up', 'Left': 'Right', 'Right': 'Left'};
    const moveMap = {'Up': [-1, 0], 'Down': [1, 0], 'Left': [0, -1], 'Right': [0, 1]};
    const arrowMap = {'Up': '▲', 'Down': '▼', 'Left': '◀', 'Right': '▶'};

    window.onload = () => {
        setupSizeSelectors();
        
        // URLパラメータにシードがあるかチェック
        const urlParams = new URLSearchParams(window.location.search);
        const seedParam = urlParams.get('seed');
        if (seedParam) {
            playFromSeed(seedParam);
        }

        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isAutoPlaying) return;
            if (e.key === 'ArrowUp') attemptMove('Up');
            if (e.key === 'ArrowDown') attemptMove('Down');
            if (e.key === 'ArrowLeft') attemptMove('Left');
            if (e.key === 'ArrowRight') attemptMove('Right');
        });
    };

    function setupSizeSelectors() {
        const container = document.getElementById('size-selectors');
        for (let i = 5; i <= 9; i++) {
            const label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="gridSize" value="${i}" ${i==5?'checked':''} onchange="gridSize=${i}"> ${i}x${i}`;
            container.appendChild(label);
        }
    }

    // --- ゲーム開始のコアロジック ---
    function startGameByDifficulty(baseSteps) {
        const randomID = Math.floor(Math.random() * 999999);
        const newSeed = `${gridSize}-${baseSteps}-${randomID}`;
        playFromSeed(newSeed);
    }

    function playFromSeedInput() {
        const val = document.getElementById('seed-input').value;
        if (val) playFromSeed(val);
    }

    function playFromSeed(seedString) {
        stopAutoPlay();
        const parts = seedString.split('-');
        if (parts.length !== 3) {
            alert("無効なシード形式です");
            return;
        }

        currentSeedString = seedString;
        document.getElementById('seed-input').value = seedString;
        
        gridSize = parseInt(parts[0]);
        const baseSteps = parseInt(parts[1]);
        const seedVal = parseInt(parts[2]);
        const actualSteps = Math.round(baseSteps * (gridSize * gridSize / 25.0));

        // シード値を使って乱数生成器を初期化
        const rng = mulberry32(seedVal);

        buildGridUI();
        const generated = generateBoardSeeded(actualSteps, rng);
        
        gridData = generated.grid;
        playerPos = generated.pos;
        solutionMoves = generated.moves.reverse().map(m => opposites[m]);
        
        movesLeft = actualSteps;
        initialGridData = gridData.map(row => [...row]);
        initialPlayerPos = [...playerPos];
        initialMoves = actualSteps;
        lastMove = null;
        isPlaying = true;

        document.getElementById('status-label').innerText = `パズル読込完了 (${gridSize}x${gridSize})`;
        document.getElementById('answer-display').style.display = 'none';
        updateGridUI();
    }

    function generateBoardSeeded(steps, rng) {
        let grid = Array.from({length: gridSize}, () => Array(gridSize).fill(0));
        let r = Math.floor(rng() * gridSize);
        let c = Math.floor(rng() * gridSize);
        let lastGenMove = null;
        let genMoves = [];
        
        const directions = [
            {dr: -1, dc: 0, name: 'Up'}, {dr: 1, dc: 0, name: 'Down'},
            {dr: 0, dc: -1, name: 'Left'}, {dr: 0, dc: 1, name: 'Right'}
        ];

        for (let i = 0; i < steps; i++) {
            grid[r][c] = 1 - grid[r][c];
            let validMoves = directions.filter(d => {
                if (lastGenMove && d.name === opposites[lastGenMove]) return false;
                let nr = r + d.dr, nc = c + d.dc;
                return (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize);
            });
            
            if (validMoves.length === 0) break;
            let move = validMoves[Math.floor(rng() * validMoves.length)];
            r += move.dr; c += move.dc;
            lastGenMove = move.name;
            genMoves.push(move.name);
        }
        return {grid, pos: [r, c], moves: genMoves};
    }

    // --- UI更新・操作 ---
    function buildGridUI() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        let cellSize = gridSize <= 6 ? '50px' : (gridSize <= 7 ? '40px' : '30px');

        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                cell.style.width = cell.style.height = cellSize;
                container.appendChild(cell);
            }
        }
    }

    function updateGridUI() {
        document.getElementById('moves-label').innerText = `残り手数: ${movesLeft}`;
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                cell.classList.toggle('active', gridData[r][c] === 1);
                cell.innerText = (r === playerPos[0] && c === playerPos[1]) ? "★" : "";
            }
        }
    }

    function attemptMove(moveName, isAuto = false) {
        if (!isPlaying || (isAutoPlaying && !isAuto)) return;
        if (lastMove && moveName === opposites[lastMove]) return;

        let dr = moveMap[moveName][0], dc = moveMap[moveName][1];
        let nr = playerPos[0] + dr, nc = playerPos[1] + dc;

        if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
            playerPos = [nr, nc];
            gridData[nr][nc] = 1 - gridData[nr][nc];
            lastMove = moveName;
            movesLeft--;
            updateGridUI();
            checkGameEnd();
        }
    }

    function checkGameEnd() {
        let flat = gridData.flat();
        if (flat.every(c => c === 0) || flat.every(c => c === 1)) {
            isPlaying = false;
            document.getElementById('status-label').innerText = "🎉 クリア！";
            return;
        }
        if (movesLeft <= 0) {
            isPlaying = false;
            document.getElementById('status-label').innerText = "GAME OVER";
        }
    }

    function resetGame() {
        if (currentSeedString) playFromSeed(currentSeedString);
    }

    function copyShareURL() {
        if (!currentSeedString) { alert("ゲームを開始してください"); return; }
        const url = window.location.origin + window.location.pathname + "?seed=" + currentSeedString;
        navigator.clipboard.writeText(url).then(() => alert("共有用URLをコピーしました！"));
    }

    function toggleAnswer() {
        const ansDiv = document.getElementById('answer-display');
        ansDiv.style.display = ansDiv.style.display === 'none' ? 'block' : 'none';
        ansDiv.innerText = solutionMoves.map(m => arrowMap[m]).join('→');
    }

    function autoPlayAnswer() {
        if (!isPlaying || isAutoPlaying) return;
        resetGame();
        isAutoPlaying = true;
        let step = 0;
        autoPlayInterval = setInterval(() => {
            if (step < solutionMoves.length) {
                attemptMove(solutionMoves[step], true);
                step++;
            } else {
                stopAutoPlay();
            }
        }, 400);
    }

    function stopAutoPlay() {
        clearInterval(autoPlayInterval);
        isAutoPlaying = false;
    }
</script>
</body>
</html>
